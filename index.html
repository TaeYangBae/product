<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Notepad | 스마트 메모장</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons: Lucide (Icons as a font via CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <h1>Memo <span>.</span></h1>
                <button id="add-note-btn" class="btn-icon" aria-label="새 메모 추가">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </header>
            
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="search-input" placeholder="메모 검색...">
            </div>
            
            <nav class="notes-list" id="notes-list">
                <!-- Notes will be injected here by JS -->
                <div class="empty-state">
                    <p>메모가 없습니다.</p>
                </div>
            </nav>
            
            <footer class="sidebar-footer">
                <p id="total-notes">0 notes</p>
            </footer>
        </aside>
        
        <!-- Main Editor -->
        <main class="editor-view" id="editor-view">
            <div id="no-selection" class="no-selection">
                <div class="illustration">
                    <i class="bi bi-journal-text"></i>
                </div>
                <h2>작성할 메모를 선택하세요</h2>
                <p>또는 "+" 버튼을 눌러 새 메모를 시작하세요.</p>
            </div>
            
            <div id="editor-container" class="editor-container hidden">
                <header class="editor-header">
                    <div class="editor-meta">
                        <span id="note-date">Last modified: -</span>
                    </div>
                    <div class="editor-actions">
                        <button id="delete-note-btn" class="btn-icon btn-delete" aria-label="메모 삭제">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>
                </header>
                
                <div class="note-editor">
                    <input type="text" id="note-title-input" class="title-input" placeholder="제목 없음">
                    <textarea id="note-body-input" class="body-input" placeholder="여기에 내용을 입력하세요..."></textarea>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
