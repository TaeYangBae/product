<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Notepad | 프리미엄 메모장</title>
    
    <!-- Google Fonts & Pretendard -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Password Protection -->
    <div id="password-overlay" class="password-overlay">
        <div class="password-card">
            <div class="lock-icon"><i class="bi bi-shield-lock-fill"></i></div>
            <h2>비공개 메모장</h2>
            <p>비밀번호 4자리를 입력하세요.</p>
            <div class="password-input-group">
                <input type="password" id="password-input" maxlength="4" placeholder="••••" autofocus>
            </div>
            <div id="password-error" class="password-error hidden">비밀번호가 틀렸습니다.</div>
        </div>
    </div>

    <div class="app-container blurred" id="main-app">
        <!-- 1st Column: Note List Sidebar -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <h1>Memo <span>.</span></h1>
                <button id="add-note-btn" class="btn-icon add-main-btn" aria-label="새 메모 추가">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </header>
            
            <div class="search-box">
                <i class="bi bi-search"></i>
                <input type="text" id="search-input" placeholder="메모 검색...">
            </div>
            
            <nav class="notes-list" id="notes-list">
                <!-- Notes will be injected here -->
            </nav>
            
            <footer class="sidebar-footer">
                <p id="total-notes">0 notes</p>
            </footer>
        </aside>
        
        <!-- 2nd Column: Main Editor -->
        <main class="editor-view" id="editor-view">
            <div id="no-selection" class="no-selection">
                <div class="illustration"><i class="bi bi-journal-text"></i></div>
                <h2>작성할 메모를 선택하세요</h2>
                <p>당신의 소중한 생각을 기록해보세요.</p>
            </div>
            
            <div id="editor-container" class="editor-container hidden">
                <header class="editor-header">
                    <div class="editor-meta">
                        <span id="note-date">Last modified: -</span>
                    </div>
                    <div class="editor-actions">
                        <input type="file" id="image-upload-input" accept="image/*" class="hidden">
                        <button id="image-upload-btn" class="btn-icon" title="이미지 첨부"><i class="bi bi-image"></i></button>
                        <button id="pin-note-btn" class="btn-icon" title="메모 고정"><i class="bi bi-pin-angle"></i></button>
                        <button id="save-note-btn" class="btn-icon btn-save" title="메모 저장"><i class="bi bi-check-lg"></i></button>
                        <button id="delete-note-btn" class="btn-icon btn-delete" title="메모 삭제"><i class="bi bi-trash3"></i></button>
                    </div>
                </header>
                
                <div class="note-editor">
                    <input type="text" id="note-title-input" class="title-input" placeholder="제목 없음">
                    <div id="note-image-container" class="note-image-container hidden">
                        <img id="note-image-preview" src="" alt="첨부 이미지">
                        <button id="remove-image-btn" class="remove-image-btn"><i class="bi bi-x"></i></button>
                    </div>
                    <textarea id="note-body-input" class="body-input" placeholder="여기에 내용을 입력하세요..."></textarea>
                </div>
            </div>
        </main>

        <!-- 3rd Column: Utility Sidebar (Calendar, D-Day, Pinned) -->
        <aside class="utility-sidebar" id="utility-sidebar">
            <!-- Pinned Memo Section -->
            <section class="utility-section pinned-section">
                <header class="utility-header">
                    <i class="bi bi-pin-fill"></i>
                    <h2>Pinned</h2>
                </header>
                <div id="pinned-content" class="pinned-content">
                    <div class="pinned-empty">고정된 메모가 없습니다.</div>
                </div>
            </section>

            <!-- Calendar Section -->
            <section class="utility-section calendar-section">
                <header class="utility-header">
                    <i class="bi bi-calendar3"></i>
                    <h2 id="calendar-month-year">March 2026</h2>
                </header>
                <div class="calendar-grid-header">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </section>

            <!-- D-Day Section -->
            <section class="utility-section dday-section">
                <header class="utility-header">
                    <i class="bi bi-flag-fill"></i>
                    <h2>Upcoming</h2>
                </header>
                <div id="dday-list" class="dday-list"></div>
            </section>
        </aside>
    </div>

    <!-- Schedule Modal -->
    <div id="schedule-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <header class="modal-header">
                <h2 id="schedule-modal-title">일정 관리</h2>
                <button id="close-schedule-modal" class="btn-icon"><i class="bi bi-x-lg"></i></button>
            </header>
            <div class="modal-body">
                <div class="form-group">
                    <label>일정 제목</label>
                    <input type="text" id="schedule-title" placeholder="무엇을 해야 하나요?">
                </div>
                <div class="form-group">
                    <label>반복 주기</label>
                    <select id="schedule-frequency">
                        <option value="none">반복 없음</option>
                        <option value="daily">매일</option>
                        <option value="monthly">매달</option>
                        <option value="yearly">매년</option>
                    </select>
                </div>
                <div class="schedule-list-container">
                    <h3>오늘의 일정</h3>
                    <ul id="schedule-list"></ul>
                </div>
            </div>
            <footer class="modal-footer">
                <button id="save-schedule-btn" class="btn-primary">저장</button>
            </footer>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
